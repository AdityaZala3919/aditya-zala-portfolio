services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portfolio-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
    environment:
      VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge